name: DataOps and MLOps Pipeline

on:
  push:
    paths:
      - "data/raw/*.dvc"
      - "dlt_pipeline/**"
      - "dbt/**"
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/dataops-mlops.yml"
  workflow_dispatch:

jobs:
  dataops-mlops:
    runs-on: ubuntu-latest

    env:
      RAW_DATA_PATH: data/raw/student_performance.csv
      DUCKDB_PATH: data/student_score.duckdb
      MODEL_PATH: models/student_score_model.joblib
      METRICS_PATH: models/metrics.json
      MLFLOW_TRACKING_URI: mlruns
      MLFLOW_EXPERIMENT_NAME: eduscore-student-performance
      PREDICTION_LOG_PATH: monitoring/predictions.jsonl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check DVC Google Drive support
        run: dvc version

      - name: Configure DVC Google Drive credentials
        env:
          DVC_GDRIVE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.DVC_GDRIVE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          if [ -z "$DVC_GDRIVE_SERVICE_ACCOUNT_JSON_B64" ]; then
            echo "::error::Missing GitHub secret DVC_GDRIVE_SERVICE_ACCOUNT_JSON_B64"
            exit 1
          fi
          echo "$DVC_GDRIVE_SERVICE_ACCOUNT_JSON_B64" | base64 --decode > "$RUNNER_TEMP/gdrive-service-account.json"
          dvc remote modify --local gdrive gdrive_use_service_account true
          dvc remote modify --local gdrive gdrive_service_account_json_file_path "$RUNNER_TEMP/gdrive-service-account.json"

      - name: Pull dataset with DVC
        run: dvc pull -v data/raw/student_performance.csv.dvc

      - name: Run dlt ingestion
        run: python dlt_pipeline/load_student_data.py

      - name: Run dbt models
        run: dbt run --project-dir dbt/student_score --profiles-dir dbt/student_score

      - name: Run dbt tests
        run: dbt test --project-dir dbt/student_score --profiles-dir dbt/student_score

      - name: Run pytest
        run: pytest -q

      - name: Train model
        run: python -m src.student_score_mlops.train

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/*.joblib
          if-no-files-found: error

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: model-metrics
          path: models/*.json
          if-no-files-found: error

      - name: Upload MLflow outputs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/**
          if-no-files-found: warn
