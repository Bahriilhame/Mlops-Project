services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/student_score_model.joblib
      - PREDICTION_LOG_PATH=monitoring/predictions.jsonl
    volumes:
      - ./models:/app/models
      - ./monitoring:/app/monitoring

  mlflow:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install mlflow==2.14.3 &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /app/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app

